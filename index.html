<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Directory</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 600;
            background: linear-gradient(90deg, #bb86fc, #03dac6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }
        .gallery-item {
            background-color: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }
        .gallery-image {
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid #333;
        }
        .image-caption {
            padding: 20px;
            text-align: center;
            font-size: 1.1rem;
            color: #e0e0e0;
            font-weight: 400;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <h1>Portfolio Image Gallery</h1>

    <div class="gallery">
        <div class="gallery-item">
            <img class="gallery-image" src="images/Screenshot%202026-04-19%20at%2011.11.32%E2%80%AFPM.png" alt="Screenshot">
            <div class="image-caption">Screenshot</div>
        </div>
    </div>

</body>
</html>
